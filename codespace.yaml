server:
    listen_addr: :18080
    runtime_api_listen: :18080
    runtime_api_url: http://127.0.0.1:18080
    gateway_listen: :18081
    gateway_ssh_listen: :2222
    public_base_url: http://127.0.0.1:18081
    shutdown_timeout: 10s
gitea:
    url: http://127.0.0.1:3000
gateway:
    ssh_host: 127.0.0.1
    ssh_port: 2222
    gateway_session_revalidate_interval: 5m
    gateway_max_inflight_total: 4096
    gateway_max_inflight_per_session: 32
    gateway_public_max_connections_per_endpoint: 64
    gateway_public_max_connections_per_ip: 16
    gateway_validation_max_inflight: 128
manager:
    state_dir: codespace-state
    name: codespace-manager
    gateway_url: http://127.0.0.1:18080
    gateway_ssh_addr: 127.0.0.1:2222
    gateway_ssh_host_key_algorithm: ""
    gateway_ssh_host_key_fingerprint_sha256: ""
    gateway_ssh_host_key_updated_unix: 0
    version: 0.1.0
    poll_interval: 750ms
    declare_interval: 5s
    capacity_total: 4
    capacity_available: 4
    cleanup_capacity_available: 4
    max_operations: 4
    http_timeout: 15s
    tags:
        - default
scripts:
    init: builtin
    start: builtin
    resume: builtin
provisioner:
    kind: dummy
    codespace_root: /codespace
    incus:
        remote: ""
        unix_socket: ""
        project: ""
        communication_interface: eth0
    bootstrap:
        shell: /bin/sh
        home_dir: /root
        user: 0
        group: 0
